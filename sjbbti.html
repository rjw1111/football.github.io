            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];

    // 测试配置
    const TEST_QUESTIONS_COUNT = 30; // 全部30题
    
    // 状态变量
    let questions = [];
    let currentQuestionIndex = 0;
    let answers = {};
    let shuffledOptions = {}; // 记录每道题打乱后的选项顺序
    
    function init() {
        // 使用全部题目
        questions = [...allQuestions];
        
        document.getElementById('totalQuestions').textContent = questions.length;
        loadQuestion();
    }
    
    function loadQuestion() {
        const question = questions[currentQuestionIndex];
        
        document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
        document.getElementById('progressFill').style.width = ((currentQuestionIndex + 1) / questions.length * 100) + '%';
        document.getElementById('questionNumber').textContent = '第 ' + (currentQuestionIndex + 1) + ' 题';
        document.getElementById('questionText').textContent = question.question;
        
        const optionsContainer = document.getElementById('optionsContainer');
        optionsContainer.innerHTML = '';
        
        // 如果这道题还没打乱过选项，先打乱
        if (!shuffledOptions[currentQuestionIndex]) {
            // 复制选项并打乱顺序
            shuffledOptions[currentQuestionIndex] = shuffleArray([...question.options]);
        }
        
        const currentOptions = shuffledOptions[currentQuestionIndex];
        
        currentOptions.forEach(function(option, index) {
            const optionDiv = document.createElement('div');
            optionDiv.className = 'option' + (answers[currentQuestionIndex] === option.type ? ' selected' : '');
            optionDiv.onclick = function() { selectOption(option.type); };
            optionDiv.dataset.type = option.type;
            
            const textDiv = document.createElement('div');
            textDiv.className = 'option-text';
            textDiv.textContent = option.text;
            
            optionDiv.appendChild(textDiv);
            optionsContainer.appendChild(optionDiv);
        });
        
        updateNavButtons();
    }
    
    function selectOption(type) {
        answers[currentQuestionIndex] = type;
        
        document.querySelectorAll('.option').forEach(function(opt) {
            opt.classList.remove('selected');
            if (opt.dataset.type === type) {
                opt.classList.add('selected');
            }
        });
        
        updateNavButtons();
    }
    
    function updateNavButtons() {
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        prevBtn.disabled = currentQuestionIndex === 0;
        
        if (currentQuestionIndex === questions.length - 1) {
            nextBtn.textContent = '查看结果';
            nextBtn.disabled = !answers[currentQuestionIndex];
        } else {
            nextBtn.textContent = '下一题';
            nextBtn.disabled = !answers[currentQuestionIndex];
        }
    }
    
    function nextQuestion() {
        if (currentQuestionIndex === questions.length - 1) {
            showResult();
        } else {
            currentQuestionIndex++;
            loadQuestion();
        }
    }
    
    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion();
        }
    }
    
    function calculateResult() {
        const counts = {
            messi: 0,
            ronaldo: 0,
            modric: 0,
            mbappe: 0,
            neymar: 0,
            van: 0,
            haaland: 0,
            iniesta: 0
        };
        
        Object.values(answers).forEach(function(type) {
            if (counts.hasOwnProperty(type)) {
                counts[type]++;
            }
        });
        
        // 找出最高票数
        let maxCount = 0;
        let result = 'messi';
        for (const type in counts) {
            if (counts[type] > maxCount) {
                maxCount = counts[type];
                result = type;
            }
        }
        
        return { result: result, counts: counts };
    }
    
    function showResult() {
        const resultData = calculateResult();
        const result = resultData.result;
        const counts = resultData.counts;
        
        document.getElementById('questionContainer').style.display = 'none';
        document.querySelector('.nav-buttons').style.display = 'none';
        document.querySelector('.mbti-header .progress-text').style.display = 'none';
        
        const resultContainer = document.getElementById('resultContainer');
        resultContainer.classList.add('show');
        
        const player = playerTypes[result];
        
        const badge = document.getElementById('resultBadge');
        badge.textContent = player.icon + '\n' + player.name;
        badge.className = 'result-badge ' + result;
        
        document.getElementById('resultTitle').textContent = player.name + ' | ' + player.title;
        document.getElementById('resultSubtitle').textContent = '你的世界杯球星人格是：' + player.name;
        
        const statsContainer = document.getElementById('statsContainer');
        statsContainer.innerHTML = '';
        for (const type in counts) {
            const statItem = document.createElement('div');
            statItem.className = 'stat-item';
            statItem.textContent = playerTypes[type].name + ': ' + counts[type] + '次';
            statsContainer.appendChild(statItem);
        }
        
        document.getElementById('resultDescription').textContent = player.description;
    }

        document.getElementById('donationContainer').style.display = 'none';

        document.getElementById('questionContainer').style.display = 'block';
        document.querySelector('.nav-buttons').style.display = 'flex';
        document.querySelector('.mbti-header .progress-text').style.display = 'block';
        
        init(); // 重新初始化，再次打乱选项
    }
    
    window.onload = function() {
        init();
    };
